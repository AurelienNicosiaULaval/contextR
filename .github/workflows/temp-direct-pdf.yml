name: Récupération temporaire directe des PDF
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: python -m pip install --upgrade requests pypdf
      - name: Télécharger avec plusieurs transports
        run: |
          set +e
          python temp_direct_pdf_recovery.py > run_direct.log 2>&1
          status=$?
          cat run_direct.log
          exit $status
      - name: Créer l'archive
        if: always()
        run: |
          python - <<'PY'
          import shutil
          shutil.make_archive("notes-master-math-france-direct","zip","notes_master_math_france_direct")
          PY
      - name: Publier l'archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-master-math-france-direct
          path: |
            notes-master-math-france-direct.zip
            notes_master_math_france_direct/manifest.csv
            notes_master_math_france_direct/manifest.json
            run_direct.log
          if-no-files-found: error
          retention-days: 3
